name: Release translations

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all CSVs
        run: python scripts/validate.py translations/

      - name: Export JSON (full, all languages — for inspection)
        run: python scripts/export_json.py --out translations.json

      - name: Export per-language launcher payloads (translated, no source, gzipped)
        run: |
          for lang in fr en; do
            python scripts/export_json.py \
              --out "translations-${lang}.json" \
              --lang "$lang" --only-translated --no-source --gzip
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: translations
          path: |
            translations.json
            translations-fr.json.gz
            translations-en.json.gz

      - name: Create rolling release (main pushes)
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest translations
          body: |
            Auto-generated translation files, updated on every push to `main`.

            **Launcher payloads (small, gzipped, no `source` field):**
            - `translations-fr.json.gz` — French, translated rows only
            - `translations-en.json.gz` — English, translated rows only

            **Full export (for inspection / tooling):**
            - `translations.json` — all strings, all languages, with source

            These files contain **only translated text** — no original game data.

            ### Apply with mhf-outpost + FrontierTextHandler

            ```bash
            # 1. Download the per-language gzipped payload into your game dir
            mhf-outpost translate --path ~/mhf --lang fr

            # 2. Decompress (FTH currently expects plain JSON)
            gunzip ~/mhf/translations-fr.json.gz

            # 3. Apply to your game files (requires FrontierTextHandler ≥ 1.5.0)
            cd FrontierTextHandler
            python main.py ~/mhf/translations-fr.json \
              --apply-translations --lang fr --game-dir ~/mhf \
              --compress --encrypt
            ```

            Or use `scripts/build_bins.py` locally for a full rebuild from CSVs.
          files: |
            translations.json
            translations-fr.json.gz
            translations-en.json.gz
          make_latest: true

      - name: Create tagged release (v* tags)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Immutable tagged release built from `${{ github.sha }}`.

            - `translations-fr.json.gz` / `translations-en.json.gz` — per-language launcher payloads (translated rows only, no source, gzipped)
            - `translations.json` — full export with source, all languages

            Requires [FrontierTextHandler](https://github.com/Houmgaor/FrontierTextHandler) ≥ 1.5.0 (index-keyed CSV format).
          files: |
            translations.json
            translations-fr.json.gz
            translations-en.json.gz
          make_latest: false
